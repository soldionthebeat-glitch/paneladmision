<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admision - ProducersGo</title>
  <link rel="icon" href="/Fontend/img/logo de pestana .png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #06111f; --panel: rgba(10,24,48,0.85); --line: rgba(124,184,255,0.2);
      --text: #edf6ff; --muted: #9db6d8; --blue: #0a66ff; --cyan: #66d9ff;
      --ok: #00ff9a; --error: #ff4560; --radius: 10px;
      --shadow: 0 22px 70px rgba(1,8,22,0.52);
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 18% 8%, rgba(10,102,255,0.34), transparent 30%),
                  radial-gradient(circle at 80% 0%, rgba(102,217,255,0.22), transparent 26%),
                  linear-gradient(145deg, #030b18 0%, #071b35 52%, #020712 100%);
      color: var(--text); padding: 20px;
    }
    .wrap { max-width: 720px; margin: 0 auto; }
    .topbar {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px;
    }
    .topbar a {
      text-decoration: none; color: var(--cyan);
      background: rgba(102,217,255,0.08); border: 1px solid rgba(102,217,255,0.25);
      border-radius: 999px; padding: 8px 12px; font-size: 13px; font-weight: 700;
    }
    .card {
      border: 1px solid var(--line); border-radius: 16px;
      background: var(--panel); box-shadow: var(--shadow); overflow: hidden;
    }
    .hero {
      padding: 24px; border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(10,102,255,0.2), rgba(102,217,255,0.08));
    }
    .hero h1 { margin: 0 0 8px; font-size: 28px; }
    .hero p { margin: 0; color: var(--muted); }
    .content { padding: 22px; display: grid; gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    label { display: grid; gap: 6px; font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; }
    input, select, textarea {
      width: 100%; min-height: 44px; border-radius: var(--radius);
      border: 1px solid rgba(124,184,255,0.25);
      background: rgba(3,18,43,0.75); color: var(--text);
      outline: none; padding: 11px 12px;
      font: inherit; resize: vertical;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--cyan); box-shadow: 0 0 0 3px rgba(102,217,255,0.14);
    }
    textarea { min-height: 80px; }
    button {
      min-height: 44px; border-radius: var(--radius); border: 0;
      color: #fff; font-weight: 800; cursor: pointer; padding: 10px 16px;
      font: inherit; transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--blue), var(--cyan)); min-width: 200px;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-ghost {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.18); color: var(--muted);
    }
    .status-box {
      display: none; padding: 12px; border-radius: var(--radius);
      font-weight: 700; font-size: 13px; border: 1px solid transparent;
    }
    .status-box.show { display: block; }
    .status-box.ok { color: var(--ok); background: rgba(0,255,154,0.08); border-color: rgba(0,255,154,0.35); }
    .status-box.error { color: var(--error); background: rgba(255,69,96,0.08); border-color: rgba(255,69,96,0.35); }
    .info-text { color: var(--muted); font-size: 13px; }
    @media (max-width: 600px) { .grid-2 { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a href="/Fontend/instrumentales/home.html">Explorer</a>
      <a href="/Fontend/instrumentales/dashboard.html">Mi Panel</a>
      <a href="/">Inicio</a>
    </div>

    <section class="card">
      <div class="hero">
        <h1>Admision ProducersGo</h1>
        <p>Completa el formulario para solicitar tu ingreso al sello. Te responderemos a la brevedad.</p>
      </div>

      <form id="admissionForm" class="content">
        <div class="grid-2">
          <label>
            Nombre artistico *
            <input type="text" id="artisticName" required placeholder="Ej: Soldi On The Beat">
          </label>
          <label>
            Nombre real
            <input type="text" id="realName" placeholder="Tu nombre completo">
          </label>
        </div>

        <div class="grid-2">
          <label>
            Email *
            <input type="email" id="email" required placeholder="tu@email.com">
          </label>
          <label>
            Pais
            <input type="text" id="country" placeholder="Argentina">
          </label>
        </div>

        <label>
          Generos musicales
          <input type="text" id="genres" placeholder="Ej: Trap, Drill, Reggaeton, Hip-Hop">
        </label>

        <div class="grid-2">
          <label>
            Años de experiencia
            <input type="number" id="yearsExperience" min="0" max="50" placeholder="3">
          </label>
          <label>
            Redes sociales
            <input type="text" id="socialMedia" placeholder="@instagram, youtube, soundcloud">
          </label>
        </div>

        <label>
          Portafolio
          <input type="text" id="portfolio" placeholder="Link a tu portafolio, beats o musica">
        </label>

        <label>
          Biografia
          <textarea id="biography" placeholder="Cuenta sobre ti, tu experiencia y tu sonido..."></textarea>
        </label>

        <label>
          Motivo de ingreso
          <textarea id="reason" placeholder="Por que quieres formar parte de ProducersGo? Que esperas lograr?"></textarea>
        </label>

        <div id="status" class="status-box"></div>

        <div style="display:flex; gap: 12px; flex-wrap: wrap;">
          <button type="submit" id="submitBtn" class="btn-primary">Enviar solicitud</button>
          <button type="reset" class="btn-ghost">Limpiar</button>
        </div>

        <p class="info-text">* Campos obligatorios. Recibiras una respuesta por email cuando tu solicitud sea revisada.</p>
      </form>
    </section>
  </div>

  <script>
    const API_URL = (["localhost", "127.0.0.1"].includes(window.location.hostname) || window.location.protocol === "file:" 
      ? "http://localhost:5000" 
      : "https://backend-j3sk.onrender.com");

    const form = document.getElementById("admissionForm");
    const statusBox = document.getElementById("status");
    const submitBtn = document.getElementById("submitBtn");

    function showStatus(text, type) {
      statusBox.textContent = text;
      statusBox.className = `status-box show ${type}`;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = "Enviando solicitud...";

      const data = {
        artisticName: document.getElementById("artisticName").value.trim(),
        realName: document.getElementById("realName").value.trim(),
        email: document.getElementById("email").value.trim().toLowerCase(),
        country: document.getElementById("country").value.trim(),
        genres: document.getElementById("genres").value.trim(),
        yearsExperience: Number(document.getElementById("yearsExperience").value) || 0,
        socialMedia: document.getElementById("socialMedia").value.trim(),
        portfolio: document.getElementById("portfolio").value.trim(),
        biography: document.getElementById("biography").value.trim(),
        reason: document.getElementById("reason").value.trim()
      };

      try {
        const res = await fetch(`${API_URL}/api/admission`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });

        const result = await res.json();
        if (!res.ok) {
          showStatus(result.message || "Error al enviar la solicitud.", "error");
          return;
        }

        showStatus("Solicitud enviada correctamente. Recibiras una respuesta pronto.", "ok");
        form.reset();
      } catch (err) {
        showStatus("Error de conexion con el servidor.", "error");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Enviar solicitud";
      }
    });

    // Auto-fill from logged in user
    (async () => {
      const token = localStorage.getItem("token");
      if (token) {
        try {
          const res = await fetch(`${API_URL}/api/me`, {
            headers: { Authorization: "Bearer " + token }
          });
          if (res.ok) {
            const user = await res.json();
            if (user.producerName) document.getElementById("artisticName").value = user.producerName;
            if (user.email) document.getElementById("email").value = user.email;
            if (user.country) document.getElementById("country").value = user.country;
            if (user.genres) document.getElementById("genres").value = user.genres;
            if (user.socialMedia) document.getElementById("socialMedia").value = user.socialMedia;
            if (user.portfolio) document.getElementById("portfolio").value = user.portfolio;
            if (user.biography) document.getElementById("biography").value = user.biography;
            if (user.realName) document.getElementById("realName").value = user.realName;
            if (user.yearsExperience) document.getElementById("yearsExperience").value = user.yearsExperience;
          }
        } catch {}
      }
    })();
  </script>
</body>
</html>
