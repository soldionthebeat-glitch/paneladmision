<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil de productor - Go Beats</title>
  <link rel="stylesheet" href="cssz/dashboard.css">
  <link rel="icon" href="/Fontend/img/logo de pestana .png">
</head>
<body class="go-public">
  <main class="main">
    <header class="header">
      <div>
        <p class="eyebrow">Go Beats</p>
        <h1>Perfil de productor</h1>
      </div>
      <a href="home.html" class="ghost-button">Volver</a>
    </header>

    <section class="hero-panel referral-hero">
      <img id="producerPhoto" class="referral-avatar" alt="Foto del productor" src="data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20width=%22300%22%20height=%22300%22%3E%3Crect%20width=%22300%22%20height=%22300%22%20fill=%22%230a1830%22/%3E%3Ctext%20x=%2250%25%22%20y=%2250%25%22%20fill=%22%2366d9ff%22%20font-family=%22Arial%22%20font-size=%2252%22%20text-anchor=%22middle%22%20dominant-baseline=%22middle%22%3EGB%3C/text%3E%3C/svg%3E">
      <div>
        <p class="eyebrow">Productor</p>
        <h2 id="producerName">Cargando...</h2>
        <p id="producerDescription">Perfil publico de productor.</p>
        <p id="producerSocialMedia" class="public-note"></p>
        <p id="producerBiography" class="producer-bio"></p>
        <p id="producerInstagram" class="public-note"></p>
        <p id="producerResume" class="public-note"></p>
      </div>
    </section>

    <section class="beats-section">
      <div class="section-title">
        <div>
          <p class="eyebrow">Catalogo</p>
          <h2>Beats publicados</h2>
        </div>
      </div>
      <div id="status" class="status">Cargando beats...</div>
      <div id="beatsContainer" class="beats-grid explorer-grid"></div>
    </section>

    <section class="beats-section">
      <div class="section-title">
        <div>
          <p class="eyebrow">Libreria</p>
          <h2>Packs de sonido</h2>
        </div>
      </div>
      <div id="libStatus" class="status">Cargando libreria...</div>
      <div id="libContainer" class="lib-grid"></div>
    </section>
  </main>

  <script>
    const API_URL = (["localhost", "127.0.0.1"].includes(window.location.hostname) || window.location.protocol === "file:" ? "http://localhost:5000" : "https://backend-j3sk.onrender.com");
    const params = new URLSearchParams(window.location.search);
    const producerId = params.get("id") || "";
    const beatsContainer = document.getElementById("beatsContainer");
    const statusBox = document.getElementById("status");
    const players = new Map();

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function buildAssetUrl(path) {
      if (!path) return "";
      let value = String(path).replaceAll("\\", "/");
      try {
        value = decodeURIComponent(value);
      } catch {}
      if (value.startsWith("data:") || value.startsWith("blob:")) return value;
      value = value.replace(/uploadsaudio[\u0000-\u001f\u007f]*/i, "uploads/audio/");
      value = value.replace(/uploadsimages[\u0000-\u001f\u007f]*/i, "uploads/images/");
      return value.startsWith("http") ? value : `${API_URL}/${value.replace(/^\/+/, "")}`;
    }

    function defaultPhoto() {
      return "data:image/svg+xml,%3Csvg%20xmlns=%22http://www.w3.org/2000/svg%22%20width=%22300%22%20height=%22300%22%3E%3Crect%20width=%22300%22%20height=%22300%22%20fill=%22%230a1830%22/%3E%3Ctext%20x=%2250%25%22%20y=%2250%25%22%20fill=%22%2366d9ff%22%20font-family=%22Arial%22%20font-size=%2252%22%20text-anchor=%22middle%22%20dominant-baseline=%22middle%22%3EGB%3C/text%3E%3C/svg%3E";
    }

    function formatTime(seconds) {
      if (!Number.isFinite(seconds)) return "0:00";
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60).toString().padStart(2, "0");
      return `${min}:${sec}`;
    }

    function getPlayer(id) {
      const root = document.querySelector(`[data-player-id="${CSS.escape(String(id))}"]`);
      if (!root) return null;
      const audioUrl = root.dataset.audio || "";
      if (!audioUrl) return null;

      if (!players.has(id)) {
        const audio = new Audio(audioUrl);
        players.set(id, { audio, root });
        audio.addEventListener("timeupdate", () => updatePlayer(id));
        audio.addEventListener("loadedmetadata", () => updatePlayer(id));
        audio.addEventListener("ended", () => {
          const btn = root.querySelector(".play-preview-btn");
          if (btn) btn.textContent = "Reproducir";
          updatePlayer(id);
        });
      }

      return players.get(id);
    }

    function updatePlayer(id) {
      const player = players.get(id);
      const root = document.querySelector(`[data-player-id="${CSS.escape(String(id))}"]`);
      if (!player || !root) return;
      const range = root.querySelector(".beat-progress");
      const time = root.querySelector(".beat-time");
      const duration = player.audio.duration || 0;
      const current = player.audio.currentTime || 0;
      if (range) {
        range.max = duration || 0;
        range.value = current || 0;
      }
      if (time) time.textContent = `${formatTime(current)} / ${formatTime(duration)}`;
    }

    function pauseOthers(id) {
      players.forEach((player, key) => {
        if (String(key) === String(id)) return;
        player.audio.pause();
        const btn = document.querySelector(`[data-player-id="${CSS.escape(String(key))}"] .play-preview-btn`);
        if (btn) btn.textContent = "Reproducir";
      });
    }

    function togglePlayer(id, btn) {
      const player = getPlayer(id);
      if (!player) return;
      if (!player.audio.paused) {
        player.audio.pause();
        btn.textContent = "Reproducir";
        return;
      }
      pauseOthers(id);
      player.audio.play().then(() => {
        btn.textContent = "Pausar";
      }).catch(() => {
        btn.textContent = "Reproducir";
      });
    }

    function seekBeat(id, seconds) {
      const player = getPlayer(id);
      if (!player) return;
      player.audio.currentTime = Math.max(0, Math.min(player.audio.duration || 0, player.audio.currentTime + seconds));
      updatePlayer(id);
    }

    function scrubBeat(id, value) {
      const player = getPlayer(id);
      if (!player) return;
      player.audio.currentTime = Number(value || 0);
      updatePlayer(id);
    }

    function renderBeats(beats) {
      if (!beats.length) {
        beatsContainer.innerHTML = "";
        statusBox.textContent = "Este productor todavia no tiene beats publicados.";
        return;
      }

      statusBox.textContent = "";
      beatsContainer.innerHTML = beats.map((beat) => {
        const cover = buildAssetUrl(beat.coverUrl);
        const audio = buildAssetUrl(beat.fileUrl);
        const playerId = String(beat.id || beat.name || Math.random()).replace(/[^a-zA-Z0-9_-]/g, "-");
        return `
          <article class="beat-card explorer-card ${beat.assigned ? "is-taken" : ""}">
            <div class="beat-cover explorer-cover">
              ${cover ? `<img src="${cover}" alt="Portada de ${escapeHtml(beat.name)}" onerror="this.style.display='none'">` : ""}
              ${beat.assigned ? `<span class="taken-badge">Tomado</span>` : `<span class="taken-badge available">Disponible</span>`}
            </div>
            <div class="beat-info explorer-info">
              <div class="beat-heading">
                <h3>${escapeHtml(beat.name || "Beat sin nombre")}</h3>
                <span>${escapeHtml(beat.genre || "Beat")}</span>
              </div>
              <div class="beat-meta">
                <span>${beat.bpm ? escapeHtml(beat.bpm) + " BPM" : "BPM libre"}</span>
                <span>${escapeHtml(beat.key || "Sin nota")}</span>
                <span>${escapeHtml(beat.mood || "Sin mood")}</span>
              </div>
              ${audio ? `<div class="beat-player-pro" data-player-id="${escapeHtml(playerId)}" data-audio="${escapeHtml(audio)}"><div class="player-buttons"><button type="button" onclick="seekBeat('${escapeHtml(playerId)}', -10)">-10s</button><button type="button" class="play-preview-btn" onclick="togglePlayer('${escapeHtml(playerId)}', this)">Reproducir</button><button type="button" onclick="seekBeat('${escapeHtml(playerId)}', 10)">+10s</button></div><input class="beat-progress" type="range" min="0" value="0" step="0.1" oninput="scrubBeat('${escapeHtml(playerId)}', this.value)"><span class="beat-time">0:00 / 0:00</span></div>` : `<p class="status">Audio no disponible</p>`}
            </div>
          </article>
        `;
      }).join("");
    }

    function formatBytes(bytes) {
      if (!bytes) return "";
      const mb = bytes / (1024 * 1024);
      return mb >= 1 ? `${mb.toFixed(1)} MB` : `${(bytes / 1024).toFixed(0)} KB`;
    }

    function renderSoundLibraries(items) {
      const container = document.getElementById("libContainer");
      const status = document.getElementById("libStatus");
      if (!items.length) {
        container.innerHTML = "";
        status.textContent = "Este productor no tiene packs de sonido aun.";
        return;
      }
      status.textContent = "";
      container.innerHTML = items.map(item => {
        const coverSrc = item.coverUrl ? buildAssetUrl(item.coverUrl) : "";
        return `
        <div class="lib-card">
          ${coverSrc ? `<div class="lib-cover"><img src="${coverSrc}" alt="${escapeHtml(item.name)}" loading="lazy" onerror="this.style.display='none'"></div>` : ""}
          <div class="lib-card-body">
            <div class="lib-head">
              <h3>${escapeHtml(item.name)}</h3>
              <span class="lib-badge">${escapeHtml(item.category)}</span>
            </div>
            ${item.description ? `<p class="lib-desc">${escapeHtml(item.description)}</p>` : ""}
            <div class="lib-meta">
              ${item.fileSize ? `<span>${formatBytes(item.fileSize)}</span>` : ""}
              ${item.tags ? `<span>${escapeHtml(item.tags)}</span>` : ""}
            </div>
            ${item.fileUrl ? `<a href="${escapeHtml(item.fileUrl)}" class="lib-download" download>Descargar</a>` : ""}
          </div>
        </div>`;
      }).join("");
    }

    async function loadProducer() {
      if (!producerId) {
        statusBox.textContent = "Falta el productor.";
        return;
      }

      try {
        const res = await fetch(`${API_URL}/api/producers/${encodeURIComponent(producerId)}`);
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || "No se pudo cargar el productor");

        const producer = data.producer || {};
        document.getElementById("producerName").textContent = producer.producerName || "Productor Go Beats";
        document.getElementById("producerDescription").textContent = producer.description || "Perfil publico de productor.";
        document.getElementById("producerSocialMedia").textContent = producer.socialMedia ? `Redes: ${producer.socialMedia}` : "";
        document.getElementById("producerBiography").textContent = producer.biography || "";
        document.getElementById("producerInstagram").textContent = producer.instagram ? `Instagram: ${producer.instagram}` : "";
        document.getElementById("producerResume").textContent = producer.resume || "";
        document.getElementById("producerPhoto").src = producer.profilePhotoUrl ? buildAssetUrl(producer.profilePhotoUrl) : defaultPhoto();
        renderBeats(data.beats || []);
        renderSoundLibraries(data.soundLibraries || []);
      } catch (err) {
        statusBox.textContent = err.message || "No se pudo cargar el perfil.";
      }
    }

    window.togglePlayer = togglePlayer;
    window.seekBeat = seekBeat;
    window.scrubBeat = scrubBeat;
    loadProducer();
  </script>
</body>
</html>
